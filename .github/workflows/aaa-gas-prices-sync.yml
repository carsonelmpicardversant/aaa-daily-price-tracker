name: AAA Gas Prices Sync

on:
  workflow_dispatch:
  schedule:
    # Run twice so we can hit 4:30 AM Eastern year-round.
    # 08:30 UTC == 4:30 AM EDT
    # 09:30 UTC == 4:30 AM EST
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Write service account key
        env:
          AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON: ${{ secrets.AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON" > credentials/aaa-gas-prices-service-account.json

      - name: Sync to Google Sheets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials/aaa-gas-prices-service-account.json
          GOOGLE_SHEET_ID: ${{ secrets.AAA_GAS_PRICES_SPREADSHEET_ID }}
        run: |
          if [ "$(TZ=America/New_York date +%H:%M)" != "04:30" ]; then
            echo "Skipping run because local New York time is not 04:30."
            {
              echo "## AAA Gas Prices Sync"
              echo ""
              echo "- Status: skipped"
              echo "- Reason: local New York time was not 04:30"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## AAA Gas Prices Sync"
            echo ""
            echo "- Status: running"
            echo "- Local time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')"
          } >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/aaa_gas_prices_to_sheets.py

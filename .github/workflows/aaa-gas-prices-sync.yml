name: AAA Gas Prices Sync

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules are UTC. These two entries cover 4:30 AM Eastern
    # across daylight saving time; the script below skips the off-season one.
    - cron: "30 8 * * *"
    - cron: "30 9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Write service account key
        env:
          AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON: ${{ secrets.AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON" > credentials/aaa-gas-prices-service-account.json

      - name: Sync to Google Sheets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials/aaa-gas-prices-service-account.json
          GOOGLE_SHEET_ID: ${{ secrets.AAA_GAS_PRICES_SPREADSHEET_ID }}
        run: |
          EVENT_NAME="${{ github.event_name }}"
          EVENT_SCHEDULE="${{ github.event.schedule }}"
          NY_OFFSET="$(TZ=America/New_York date +%z)"

          if [ "$EVENT_NAME" = "schedule" ]; then
            SHOULD_RUN="false"
            if [ "$EVENT_SCHEDULE" = "30 8 * * *" ] && [ "$NY_OFFSET" = "-0400" ]; then
              SHOULD_RUN="true"
            fi
            if [ "$EVENT_SCHEDULE" = "30 9 * * *" ] && [ "$NY_OFFSET" = "-0500" ]; then
              SHOULD_RUN="true"
            fi
            if [ "$SHOULD_RUN" != "true" ]; then
              echo "Skipping off-season schedule: $EVENT_SCHEDULE at New York offset $NY_OFFSET."
              {
                echo "## AAA Gas Prices Sync"
                echo ""
                echo "- Status: skipped"
                echo "- Reason: off-season UTC schedule"
                echo "- Event schedule: $EVENT_SCHEDULE"
                echo "- New York offset: $NY_OFFSET"
              } >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          fi

          {
            echo "## AAA Gas Prices Sync"
            echo ""
            echo "- Status: running"
            echo "- Local time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')"
            echo "- Event schedule: ${EVENT_SCHEDULE:-manual}"
          } >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/aaa_gas_prices_to_sheets.py

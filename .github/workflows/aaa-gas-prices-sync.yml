name: AAA Gas Prices Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "30 4 * * *"
      timezone: "America/New_York"

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Write service account key
        env:
          AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON: ${{ secrets.AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$AAA_GAS_PRICES_SERVICE_ACCOUNT_JSON" > credentials/aaa-gas-prices-service-account.json

      - name: Sync to Google Sheets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/credentials/aaa-gas-prices-service-account.json
          GOOGLE_SHEET_ID: ${{ secrets.AAA_GAS_PRICES_SPREADSHEET_ID }}
        run: |
          {
            echo "## AAA Gas Prices Sync"
            echo ""
            echo "- Status: running"
            echo "- Local time: $(TZ=America/New_York date '+%Y-%m-%d %H:%M %Z')"
          } >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/aaa_gas_prices_to_sheets.py
